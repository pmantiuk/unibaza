{% extends "layout.html" %}
{% block content %}

<!--<table id=tabela class="table table-hover table mydatable"> -->

<table id="data" class="table table-striped"> 
    <thead>
        <tr>
            <!--Your Columns HERE-->
            <th scope="col">skrzynia</th>
            <th scope="col">zawartość</th>
            <th scope="col">kto</th>
            <th scope="col">kiedy</th>
        </tr>
    </thead>
    <tbody>
        <!-- Your rows inside the table HERE:  -->
        {% for post in posts %}
            <tr>
                <td>{{ post.title }}</td>
                <td>{{ post.content }}</td>
                <td>{{ post.author }}</td>
                <td>{{ post.date_posted }}</td>
            </tr>
        {% endfor %}        
    </tbody>
    <tfoot>
        <tr>
            <!--Your Columns HERE-->
            <th scope="col">skrzynia</th>
            <th scope="col">zawartość</th>
            <th scope="col">kto</th>
            <th scope="col">kiedy</th>
        </tr>
    </tfoot>>
</table>  
{% endblock content%}

{% block scripts %}
<script>
$(document).ready(function () {
  $('#data').DataTable({
    columns: [
      {orderable: true, searchable: true},
      {orderable: false, searchable: true},
      {orderable: true, searchable: true},
      {orderable: false, searchable: false}],
  });
});
</script>
{% endblock scripts %}
